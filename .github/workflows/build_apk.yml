name: Build Android APK 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.flutter
          key: ${{ runner.os }}-flutter

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: "stable"

      - name: Configurar Flutter
        run: |
          flutter config --no-analytics
          flutter doctor
          yes | flutter doctor --android-licenses || true
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Instalar Flet
        run: |
          pip install flet --pre --extra-index-url https://pypi.flet.dev

      - name: Verificar entorno
        run: |
          flet doctor

      - name: Instalar dependencias
        run: pip install -r requirements.txt
  
      - name: Build APK
        run: |
          echo "y" | flet build apk \
            --org com.tuusuario \
            --build-version 1.0.0

      - name: Build AAB
        run: |
          echo "y" | flet build aab \
            --org com.tuusuario \
            --build-version 1.0.0

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/**/*.apk
          retention-days: 30

      - name: Subir AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/**/*.aab
          retention-days: 30
